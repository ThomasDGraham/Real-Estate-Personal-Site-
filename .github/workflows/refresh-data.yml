name: Refresh DC Property Data

# Runs on the 1st of every month at 3am UTC, or manually via GitHub Actions UI
on:
  schedule:
    - cron: "0 3 1 * *"
  workflow_dispatch:   # allows manual trigger from GitHub.com → Actions tab

permissions:
  contents: write      # needed to commit the updated properties.json

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch DC property data
        run: python scripts/fetch_dc_data.py

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/properties.json
          git diff --cached --quiet || git commit -m "chore: refresh DC property data [$(date -u '+%Y-%m-%d')]"
          git push
