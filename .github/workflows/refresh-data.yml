name: Refresh DC Property Data

on:
  schedule:
    - cron: '0 6 1 * *'   # 1st of every month at 6:00 AM UTC
  workflow_dispatch:        # Allow manual trigger from GitHub UI

jobs:
  fetch-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run data fetch script
        run: python scripts/fetch_dc_data.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/properties.json
          git diff --cached --quiet || git commit -m "Auto-refresh DC property data [$(date -u +%Y-%m-%d)]"
          git push
